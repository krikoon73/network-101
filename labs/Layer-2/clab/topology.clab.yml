---

name: Layer-2
prefix: ""

mgmt:
    network: custom_mgmt
    ipv4-subnet: 192.168.0.0/24

topology:
    kinds:
        arista_ceos:
            enforce-startup-config: true
            image: ceos:4.35.0
    defaults:
        kind: arista_ceos
    nodes:
        sw1:
            mgmt-ipv4: 192.168.0.10
            binds:
            - sn/sw1.txt:/mnt/flash/ceos-config:ro
            startup-config: init-configs/sw1.cfg
        sw2:
            mgmt-ipv4: 192.168.0.11
            binds:
            - sn/sw2.txt:/mnt/flash/ceos-config:ro
            startup-config: init-configs/sw2.cfg
        sw3:
            mgmt-ipv4: 192.168.0.12
            binds:
            - sn/sw3.txt:/mnt/flash/ceos-config:ro
            startup-config: init-configs/sw3.cfg
#        host1:
#            mgmt-ipv4: 192.168.0.13
#            binds:
#            - sn/host1.txt:/mnt/flash/ceos-config:ro
#            startup-config: init-configs/host1.cfg
#        host2:
#            mgmt-ipv4: 192.168.0.14
#            binds:
#            - sn/host2.txt:/mnt/flash/ceos-config:ro
#            startup-config: init-configs/host2.cfg                    
    links:
#      - endpoints: ["host1:eth1", "sw1:eth1"]
      - endpoints: ["sw1:eth2", "sw2:eth1"]
      - endpoints: ["sw2:eth2", "sw3:eth2"]
      - endpoints: ["sw3:eth3", "sw1:eth3"]
#      - endpoints: ["sw3:eth1", "host2:eth1"]