---

name: Basic-topo
prefix: ""

topology:
    kinds:
        arista_ceos:
            enforce-startup-config: true
            image: ceos:4.35.0F
    defaults:
        kind: arista_ceos
    nodes:
        sw1:
            binds:
            - sn/sw1.txt:/mnt/flash/ceos-config:ro
            startup-config: init-configs/sw1.cfg

# --- Linux Hosts ---
        linux1:
            kind: linux
            image: ghcr.io/hellt/network-multitool # Alpine based with networking tools (ping, ip, etc.)
            exec:
                - ip addr add 192.168.10.1/24 dev eth1 # Pre-configure IP
                - ip route add 192.168.11.1 via 192.168.10.254 dev eth1

        linux2:
            kind: linux
            image: ghcr.io/hellt/network-multitool
            exec:
                - ip addr add 192.168.11.1/24 dev eth1                  
                - ip route add 192.168.10.1 via 192.168.11.254 dev eth1
    links:
    # --- Host Connections ---
    # Linux1 to SW1
    - endpoints: ["linux1:eth1", "sw1:eth1"]
    
    # Linux2 to SW2
    - endpoints: ["linux2:eth1", "sw1:eth2"]