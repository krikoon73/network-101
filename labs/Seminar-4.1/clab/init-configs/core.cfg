! Core Router Configuration
! Simplified topology for Wireshark lab

hostname core

! Enable IP routing
ip routing

! Configure loopback for router ID
interface Loopback0
   description Router ID
   ip address 1.1.1.1/32
!

! HTTP Client Network
interface Ethernet1
   description HTTP Client Network
   no switchport
   ip address 10.100.1.1/24
!

! UDP Client Network
interface Ethernet2
   description UDP Client Network
   no switchport
   ip address 10.100.2.1/24
!

! Basic HTTP Server Network
interface Ethernet3
   description Basic HTTP Server Network
   no switchport
   ip address 10.100.3.1/24
!

! DNS Server Network
interface Ethernet4
   description DNS Server Network
   no switchport
   ip address 10.100.4.1/24
!

! Management interface
interface Management0
   ip address dhcp
   dhcp client accept default-route
!

! Enable SSH
management api http-commands
   no shutdown
!

! AAA configuration
aaa authorization exec default local
!

! Local users
username admin privilege 15 role network-admin secret admin
!

! Enable password
enable secret admin
!

