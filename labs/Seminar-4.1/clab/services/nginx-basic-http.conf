events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic HTTP Server (Port 80 - UNENCRYPTED)
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /health {
            return 200 'Basic HTTP Server OK (UNENCRYPTED)\n';
            add_header Content-Type text/plain;
        }

        location /api {
            return 200 '{"status":"ok","server":"basic-http-server","protocol":"HTTP","encryption":"none","warning":"INSECURE - All traffic is visible!"}\n';
            add_header Content-Type application/json;
        }

        location /hostname {
            return 200 'basic-http-server\n';
            add_header Content-Type text/plain;
        }
    }
}

