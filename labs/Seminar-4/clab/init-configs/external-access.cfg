no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst    
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname external-access
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
! UDP Client Network
interface Ethernet1
   description UDP Client Network
   no switchport
   ip address 10.100.1.1/24
!
! TCP Client Network
interface Ethernet2
   description TCP Client Network
   no switchport
   ip address 10.100.2.1/24
!
! Link to Firewall (Outside)
interface Ethernet3
   description Link to Firewall Outside
   no switchport
   ip address 10.100.3.1/24
!
! Loopback for Router ID
interface Loopback0
   description Router ID
   ip address 1.1.1.1/32
!
ip routing
!
! Static Routes to reach networks behind firewall
ip route 10.100.4.0/24 10.100.3.10
ip route 10.100.5.0/24 10.100.3.10
ip route 10.100.6.0/24 10.100.3.10
ip route 10.100.7.0/24 10.100.3.10
ip route 10.100.8.0/24 10.100.3.10
ip route 10.100.100.10/32 10.100.3.10
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

