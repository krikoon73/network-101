no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst    
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname core
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
! Link to Firewall (Inside)
interface Ethernet1
   description Link to Firewall Inside
   no switchport
   ip address 10.100.3.21/24
!
! Reverse Proxy Frontend Network (client-facing)
interface Ethernet2
   description Reverse Proxy Frontend
   no switchport
   ip address 10.100.5.1/24
!
! Reverse Proxy Backend Network (server-facing)
interface Ethernet3
   description Reverse Proxy Backend
   no switchport
   ip address 10.100.6.1/24
!
! Web Server Network
interface Ethernet4
   description Web Server Network
   no switchport
   ip address 10.100.4.1/24
!
! DNS Server Network
interface Ethernet5
   description DNS Server Network
   no switchport
   ip address 10.100.8.1/24
!
! Basic HTTP Server Network (Unencrypted)
interface Ethernet6
   description Basic HTTP Server Network
   no switchport
   ip address 10.100.7.1/24
!
! Loopback for Router ID
interface Loopback0
   description Router ID
   ip address 2.2.2.2/32
!
ip routing
!
! Static Routes to reach client networks via firewall
ip route 10.100.1.0/24 10.100.3.10
ip route 10.100.2.0/24 10.100.3.10
!
! Route VIP to reverse-proxy frontend
ip route 10.100.100.10/32 10.100.5.10
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

