no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname services
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
! VRF Definitions
vrf instance OUTSIDE
!
vrf instance INSIDE
!
! VLAN for Firewall Outside (VRF OUTSIDE)
vlan 100
   name FW-OUTSIDE
!
! VLAN for Firewall Inside (VRF INSIDE)
vlan 200
   name FW-INSIDE
!
! Policy-Based Routing: Route TCP client traffic to Firewall Outside in VRF OUTSIDE
ip access-list standard TCP-CLIENT-TO-WEB
   10 permit 10.100.2.0/24
!
! Route-map for PBR: Set next-hop in VRF OUTSIDE
route-map PBR-TO-FW-OUTSIDE permit 10
   match ip address TCP-CLIENT-TO-WEB
   set ip next-hop vrf OUTSIDE 10.100.3.10
!
! Link to Core (Global VRF) - with PBR applied
interface Ethernet1
   description Link to Core
   no switchport
   ip address 10.0.23.2/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
   ip policy route-map PBR-TO-FW-OUTSIDE
!
interface Ethernet2
   description Not Used
   shutdown
!
! Firewall Outside Interface (trunk with VLAN 100 and 200)
interface Ethernet3
   description Firewall Trunk (Outside + Inside)
   switchport mode trunk
   switchport trunk allowed vlan 100,200
!
! Reverse Proxy Network (VRF INSIDE)
interface Ethernet4
   description Reverse Proxy Network
   no switchport
   vrf INSIDE
   ip address 10.100.5.1/24
!
! SVI for Firewall Outside (VRF OUTSIDE)
interface Vlan100
   description Firewall Outside
   vrf OUTSIDE
   ip address 10.100.3.1/24
!
! SVI for Firewall Inside (VRF INSIDE)
interface Vlan200
   description Firewall Inside
   vrf INSIDE
   ip address 10.100.4.1/24
!
! Loopback for OSPF Router ID
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.0
!
! Global routing
ip routing
!
! VRF routing
ip routing vrf OUTSIDE
ip routing vrf INSIDE
!
! OSPF Configuration (Global VRF)
router ospf 1
   router-id 3.3.3.3
   max-lsa 12000
!
! ========================================
! Route Leaking Configuration
! ========================================
!
! VRF OUTSIDE Static Routes
! Local network for firewall outside
ip route vrf OUTSIDE 10.100.3.0/24 Vlan100
!
! VRF INSIDE Static Routes
! Route to web-server network via firewall inside interface
ip route vrf INSIDE 10.100.4.0/24 Vlan200 10.100.4.10
! Route to reverse-proxy network (directly connected)
ip route vrf INSIDE 10.100.5.0/24 Ethernet4
!
! Router General for VRF Route Leaking
router general
   ! Control-plane policy for VRF route leaking
   control-plane
      ! Leak routes from default VRF to VRF OUTSIDE
      vrf OUTSIDE
         leak routes source-vrf default subscribe-policy LEAK-TO-OUTSIDE
         exit
      ! Leak routes from default VRF to VRF INSIDE
      vrf INSIDE
         leak routes source-vrf default subscribe-policy LEAK-TO-INSIDE
         exit
      ! Leak routes from VRF OUTSIDE to default VRF
      vrf default
         leak routes source-vrf OUTSIDE subscribe-policy LEAK-FROM-OUTSIDE
         leak routes source-vrf INSIDE subscribe-policy LEAK-FROM-INSIDE
         exit
      exit
   exit
!
! Route-maps for VRF route leaking
! Leak OSPF routes and default route to VRF OUTSIDE
route-map LEAK-TO-OUTSIDE permit 10
   match source-protocol ospf
!
route-map LEAK-TO-OUTSIDE permit 20
   match ip address prefix-list DEFAULT-ROUTE
!
! Leak OSPF routes and default route to VRF INSIDE
route-map LEAK-TO-INSIDE permit 10
   match source-protocol ospf
!
route-map LEAK-TO-INSIDE permit 20
   match ip address prefix-list DEFAULT-ROUTE
!
! Leak static routes from VRF OUTSIDE to default VRF
route-map LEAK-FROM-OUTSIDE permit 10
   match source-protocol static
!
! Leak static routes from VRF INSIDE to default VRF
route-map LEAK-FROM-INSIDE permit 10
   match source-protocol static
!
! Prefix list for default route
ip prefix-list DEFAULT-ROUTE seq 10 permit 0.0.0.0/0
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

