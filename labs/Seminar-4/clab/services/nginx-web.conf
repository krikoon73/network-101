events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name _;

        # Health check endpoint (HTTP)
        location /health {
            access_log off;
            return 200 "Web Server OK (HTTP)\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/web-server-cert.pem;
        ssl_certificate_key /etc/nginx/certs/web-server-key.pem;

        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            try_files $uri $uri/ =404;
        }

        # Health check endpoint (HTTPS)
        location /health {
            access_log off;
            return 200 "Web Server OK (HTTPS)\n";
            add_header Content-Type text/plain;
        }

        # API endpoint (simulated dynamic content)
        location /api {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","server":"web-server","database":"connected"}';
        }

        # Hostname endpoint - returns the container hostname
        location /hostname {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "$hostname\n";
        }
    }
}

