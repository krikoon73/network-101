# DHCP Server Configuration for Layer-4 Lab

# Global settings
default-lease-time 600;
max-lease-time 7200;
authoritative;

# Logging
log-facility local7;

# Subnet for UDP clients
subnet 10.100.1.0 netmask 255.255.255.0 {
    range 10.100.1.100 10.100.1.200;
    option routers 10.100.1.1;
    option domain-name-servers 8.8.8.8, 8.8.4.4;
    option domain-name "layer4.lab";
    option broadcast-address 10.100.1.255;
    default-lease-time 600;
    max-lease-time 7200;
}

# Static host assignment (optional)
# host udp-client {
#     hardware ethernet 00:00:00:00:00:00;
#     fixed-address 10.100.1.50;
# }

