events {
    worker_connections 1024;
}

http {
    # Upstream web server (via backend network) - HTTPS
    upstream backend {
        server 10.100.4.10:443;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name _;

        # Health check endpoint (HTTP)
        location /health {
            access_log off;
            return 200 "Reverse Proxy OK (HTTP)\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server - reverse proxy
    server {
        listen 443 ssl;
        server_name _;

        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/reverse-proxy-cert.pem;
        ssl_certificate_key /etc/nginx/certs/reverse-proxy-key.pem;

        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass https://backend;
            proxy_bind 10.100.6.10;  # Bind to backend interface for outgoing connections

            # SSL verification for backend
            proxy_ssl_verify off;  # Disable for self-signed certificates
            proxy_ssl_server_name on;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (HTTPS)
        location /health {
            access_log off;
            return 200 "Reverse Proxy OK (HTTPS)\n";
            add_header Content-Type text/plain;
        }
    }
}

