events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # HTTP server - NO HTTPS, NO ENCRYPTION
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "Basic HTTP Server OK (UNENCRYPTED)\n";
            add_header Content-Type text/plain;
        }

        # API endpoint (simulated dynamic content)
        location /api {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","server":"basic-http-server","encryption":"none","warning":"This connection is NOT secure!"}';
        }

        # Hostname endpoint - returns the container hostname
        location /hostname {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "$hostname\n";
        }
    }
}

