! EDGE Router - Fully Configured
! Hostname and basic config
hostname edge
!
! Enable IP routing
ip routing
!
! Management interface
interface Management0
   ip address 172.20.20.11/24
   no shutdown
!
! Loopback interface
interface Loopback0
   description Router ID
   ip address 172.16.0.1/32
   no shutdown
!
! Interface to ISP
interface Ethernet1
   description Link to ISP
   no switchport
   ip address 172.16.100.2/30
   no shutdown
!
! Interface to R1
interface Ethernet2
   description Link to R1
   no switchport
   ip address 172.16.100.5/30
   no shutdown
!
! Interface to R2
interface Ethernet3
   description Link to R2
   no switchport
   ip address 172.16.100.9/30
   no shutdown
!
! OSPF Configuration
router ospf 1
   router-id 172.16.0.1
   network 172.16.0.1/32 area 0.0.0.0
   network 172.16.100.4/30 area 0.0.0.0
   network 172.16.100.8/30 area 0.0.0.0
   redistribute bgp
   max-lsa 12000
!
! BGP Configuration
router bgp 65000
   router-id 172.16.0.1
   neighbor 172.16.100.1 remote-as 65001
   neighbor 172.16.100.1 description eBGP to ISP
   !
   redistribute ospf
   !
   address-family ipv4
      neighbor 172.16.100.1 activate
      redistribute ospf
!
! Enable password
enable password admin
!
! User configuration
username admin privilege 15 secret admin
!
! Management API
management api http-commands
   no shutdown
!
end

