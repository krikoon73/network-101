! R1 Router - Fully Configured
! Hostname and basic config
hostname r1
!
! Enable IP routing
ip routing
!
! Management interface
interface Management0
   ip address 172.20.20.12/24
   no shutdown
!
! Loopback interface
interface Loopback0
   description Router ID
   ip address 172.16.0.3/32
   no shutdown
!
! Interface to EDGE
interface Ethernet1
   description Link to EDGE
   no switchport
   ip address 172.16.100.6/30
   no shutdown
!
! Interface to R2
interface Ethernet2
   description Link to R2
   no switchport
   ip address 172.16.100.13/30
   no shutdown
!
! Interface to SITE1 (VLAN 10)
interface Ethernet3
   description Link to SITE1
   switchport
   switchport mode access
   switchport access vlan 10
   no shutdown
!
! VLAN 10 interface for SITE1 subnet
interface Vlan10
   description SITE1 Network
   ip address 10.1.10.1/24
   no shutdown
!
! VLAN configuration
vlan 10
   name SITE1_VLAN
!
! OSPF Configuration
router ospf 1
   router-id 172.16.0.3
   network 172.16.0.3/32 area 0.0.0.0
   network 172.16.100.4/30 area 0.0.0.0
   network 172.16.100.12/30 area 0.0.0.0
   network 10.1.10.0/24 area 0.0.0.0
   max-lsa 12000
!
! Enable password
enable password admin
!
! User configuration
username admin privilege 15 secret admin
!
! Management API
management api http-commands
   no shutdown
!
end

