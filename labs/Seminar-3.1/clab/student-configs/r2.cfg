! R2 Router - Student Configuration (OSPF NOT CONFIGURED)
! Hostname and basic config
hostname r2
!
! Enable IP routing
ip routing
!
! Management interface
interface Management0
   ip address 172.20.20.13/24
   no shutdown
!
! Loopback interface
interface Loopback0
   description Router ID
   ip address 172.16.0.4/32
   no shutdown
!
! Interface to EDGE
interface Ethernet1
   description Link to EDGE
   no switchport
   ip address 172.16.100.10/30
   no shutdown
!
! Interface to R1
interface Ethernet2
   description Link to R1
   no switchport
   ip address 172.16.100.14/30
   no shutdown
!
! Interface to SITE2 (VLAN 10)
interface Ethernet3
   description Link to SITE2
   switchport
   switchport mode access
   switchport access vlan 10
   no shutdown
!
! VLAN 10 interface for SITE2 subnet
interface Vlan10
   description SITE2 Network
   ip address 10.2.10.1/24
   no shutdown
!
! VLAN configuration
vlan 10
   name SITE2_VLAN
!
! Static route for SITE2
ip route 10.2.10.0/24 Vlan10
!
! *** TASK 1: Configure OSPF here ***
! You need to:
! - Create OSPF process 1
! - Set router-id to 172.16.0.4
! - Add networks to area 0
! - Redistribute static routes
!
! Enable password
enable password admin
!
! User configuration
username admin privilege 15 secret admin
!
! Management API
management api http-commands
   no shutdown
!
end

