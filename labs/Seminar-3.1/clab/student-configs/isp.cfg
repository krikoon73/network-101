! ISP Router - Student Configuration (BGP NOT CONFIGURED)
! Hostname and basic config
hostname isp
!
! Enable IP routing
ip routing
!
! Management interface
interface Management0
   ip address 172.20.20.10/24
   no shutdown
!
! Loopback interface
interface Loopback0
   description Router ID
   ip address 172.16.0.2/32
   no shutdown
!
! Interface to CLIENT (VLAN 10)
interface Ethernet1
   description Link to CLIENT
   switchport
   switchport mode access
   switchport access vlan 10
   no shutdown
!
! VLAN 10 interface for CLIENT subnet
interface Vlan10
   description CLIENT Network
   ip address 10.3.10.1/24
   no shutdown
!
! Interface to EDGE
interface Ethernet2
   description Link to EDGE
   no switchport
   ip address 172.16.100.1/30
   no shutdown
!
! VLAN configuration
vlan 10
   name CLIENT_VLAN
!
! Static route for CLIENT
ip route 10.3.10.0/24 Vlan10
!
! *** TASK 3: Configure BGP here ***
! You need to:
! - Create BGP AS 65001
! - Set router-id to 172.16.0.2
! - Configure eBGP neighbor to EDGE (172.16.100.2, AS 65000)
! - Advertise CLIENT network (10.3.10.0/24)
!
! Enable password
enable password admin
!
! User configuration
username admin privilege 15 secret admin
!
! Management API
management api http-commands
   no shutdown
!
end

