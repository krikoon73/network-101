! EDGE Router - Student Configuration (OSPF and BGP NOT CONFIGURED)
! Hostname and basic config
hostname edge
!
! Enable IP routing
ip routing
!
! Management interface
interface Management0
   ip address 172.20.20.11/24
   no shutdown
!
! Loopback interface
interface Loopback0
   description Router ID
   ip address 172.16.0.1/32
   no shutdown
!
! Interface to ISP
interface Ethernet1
   description Link to ISP
   no switchport
   ip address 172.16.100.2/30
   no shutdown
!
! Interface to R1
interface Ethernet2
   description Link to R1
   no switchport
   ip address 172.16.100.5/30
   no shutdown
!
! Interface to R2
interface Ethernet3
   description Link to R2
   no switchport
   ip address 172.16.100.9/30
   no shutdown
!
! *** TASK 2: Configure OSPF here ***
! You need to:
! - Create OSPF process 1
! - Set router-id to 172.16.0.1
! - Add networks to area 0
!
! *** TASK 3: Configure BGP here ***
! You need to:
! - Create BGP AS 65000
! - Set router-id to 172.16.0.1
! - Configure eBGP neighbor to ISP (172.16.100.1, AS 65001)
! - Redistribute OSPF routes into BGP
!
! Enable password
enable password admin
!
! User configuration
username admin privilege 15 secret admin
!
! Management API
management api http-commands
   no shutdown
!
end

