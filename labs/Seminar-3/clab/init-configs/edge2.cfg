no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst    
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname edge2
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
! Link to R3 (OSPF)
interface Ethernet1
   description Link to R3
   no switchport
   ip address 192.168.3.2/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
! Link to Edge1 (eBGP)
interface Ethernet2
   description Link to Edge1 (eBGP)
   no switchport
   ip address 172.16.12.2/30
!
! Loopback for Router ID
interface Loopback0
   ip address 10.0.2.1/32
   ip ospf area 0.0.0.0
!
! Simulated external network
interface Loopback100
   description External Network 2
   ip address 100.64.2.1/32
!
ip routing
!
! OSPF Configuration
router ospf 1
   router-id 10.0.2.1
   redistribute bgp
   max-lsa 12000
!
! BGP Configuration - AS 65002
router bgp 65002
   router-id 10.0.2.1
   neighbor 172.16.12.1 remote-as 65001
   neighbor 172.16.12.1 description eBGP to Edge1
   !
   network 100.64.2.1/32
   !
   address-family ipv4
      neighbor 172.16.12.1 activate
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

