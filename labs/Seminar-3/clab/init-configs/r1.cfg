no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst    
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname r1
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
vlan 10,20
!
! VLAN Interfaces for Inter-VLAN routing
interface Vlan10
   description VLAN 10 - Users
   ip address 10.10.10.1/24
!
interface Vlan20
   description VLAN 20 - Servers
   ip address 10.10.20.1/24
!
! OSPF Core Links
interface Ethernet1
   description Link to R2
   no switchport
   ip address 192.168.12.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description Link to R3
   no switchport
   ip address 192.168.13.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
! BGP Edge Connection
interface Ethernet3
   description Link to Edge1
   no switchport
   ip address 192.168.1.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
! Access Layer - Trunk to SW1
interface Ethernet4
   description Trunk to SW1
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
! Loopback for OSPF Router ID
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
ip routing
!
! OSPF Configuration
router ospf 1
   router-id 1.1.1.1
   passive-interface Vlan10
   passive-interface Vlan20
   max-lsa 12000
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

