no aaa root
aaa authentication policy local allow-nopassword-remote-login
!
username admin privilege 15 role network-admin nopassword
!
management api http-commands
   no shutdown
!
switchport default mode routed
!
spanning-tree mode rapid-pvst    
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname r2
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
aaa authorization exec default local
!
! ========================================
! STUDENT LAB: Configure OSPF on R2
! ========================================
!
! TASK: Configure OSPF to enable R2 to participate in the OSPF Area 0 backbone
!
! REQUIREMENTS:
! 1. Configure OSPF process 1 with router-id 2.2.2.2
! 2. Enable OSPF on all interfaces (Ethernet1, Ethernet2, Loopback0)
! 3. All interfaces should be in Area 0 (0.0.0.0)
! 4. Use point-to-point network type on Ethernet interfaces
!
! INTERFACES ARE PRE-CONFIGURED BELOW - DO NOT MODIFY
!
! OSPF Core Links
interface Ethernet1
   description Link to R1
   no switchport
   ip address 192.168.12.2/30
!
interface Ethernet2
   description Link to R3
   no switchport
   ip address 192.168.23.1/30
!
! Loopback for OSPF Router ID
interface Loopback0
   ip address 2.2.2.2/32
!
ip routing
!
! ========================================
! YOUR OSPF CONFIGURATION GOES HERE:
! ========================================
!
! Example commands (you need to configure these):
!
! router ospf 1
!    router-id 2.2.2.2
!    max-lsa 12000
!
! interface Ethernet1
!    ip ospf network point-to-point
!    ip ospf area 0.0.0.0
!
! interface Ethernet2
!    ip ospf network point-to-point
!    ip ospf area 0.0.0.0
!
! interface Loopback0
!    ip ospf area 0.0.0.0
!
! ========================================
!
ntp server time.apple.com source Management0
ntp server time.google.com source Management0
ntp server time.windows.com source Management0
!
end

