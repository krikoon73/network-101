name: l4-lab4.1
prefix: ""

topology:
  kinds:
    arista_ceos:
      enforce-startup-config: true
      image: ceos:4.34.1F
  nodes:
    # Linux Endpoints
    linux1:
      kind: linux
      #image: ubuntu:latest
      #exec:
      # - apt-get update
      # - apt-get install -y iproute2 iputils-ping net-tools tcpdump vim
      # - ip addr add 10.0.0.1/24 dev eth1
      # - ip route add 0.0.0.0/0 via 10.0.0.2

      image: ghcr.io/srl-labs/network-multitool
      exec:
        # IP Configuration
        - ip addr add 10.0.0.1/24 dev eth1
        - ip route add 10.0.0.0/8 via 10.0.0.2
    
    linux2:
      kind: linux
      #image: ubuntu:latest
      #exec:
      # - apt-get update
      # - apt-get install -y iproute2 iputils-ping net-tools tcpdump vim
      # - ip addr add 10.0.3.2/24 dev eth1
      # - ip route add 0.0.0.0/0 via 10.0.3.1
      image: ghcr.io/srl-labs/network-multitool
      exec:
        # IP Configuration
        - ip addr add 10.0.3.2/24 dev eth1
        - ip route add 10.0.0.0/8 via 10.0.3.1

    # Arista Switches
    ceos1:
      kind: arista_ceos
      startup-config: ./init-configs/ceos1.cfg
    
    ceos2:
      kind: arista_ceos
      startup-config: ./init-configs/ceos2.cfg
    
    ceos3:
      kind: arista_ceos
      startup-config: ./init-configs/ceos3.cfg

  links:
    # linux1 -- ceos1
    - endpoints: ["linux1:eth1", "ceos1:eth1"]
    
    # ceos1 -- ceos2
    - endpoints: ["ceos1:eth2", "ceos2:eth1"]
    
    # ceos2 -- ceos3
    - endpoints: ["ceos2:eth2", "ceos3:eth1"]
    
    # ceos3 -- linux2
    - endpoints: ["ceos3:eth2", "linux2:eth1"]